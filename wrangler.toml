name = "banyannote1986"
main = "worker.ts"
compatibility_date = "2026-04-14"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[dev]
port = 8788

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[ai]
binding = "WORKERS_AI"

[[d1_databases]]
binding = "DB"
database_name = "banyannote"
database_id = "75f514ef-bc92-4d49-814e-f2f139e3360d"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "banyannote1986-images"

[vars]
NEXT_PUBLIC_SITE_URL = "https://banyannote.cc"
AI_BASE_URL = "https://api.openai.com/v1"
AI_MODEL = "gpt-4o-mini"
WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"

